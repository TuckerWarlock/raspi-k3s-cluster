name: Helm Template Validation

on:
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
      - "manifests/**"
      - ".github/workflows/helm-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Helm Templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: TuckerWarlock/setup-helm/@v5

      - name: Add Helm repositories
        run: |
          helm repo add traefik https://traefik.github.io/charts
          helm repo add longhorn https://charts.longhorn.io
          helm repo update

      - name: Pull charts locally for linting
        run: |
          mkdir -p /tmp/charts
          helm pull traefik/traefik --untar --untardir /tmp/charts
          helm pull longhorn/longhorn --untar --untardir /tmp/charts

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION=v0.6.7
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          /tmp/kubeconform -v

      - name: Lint Traefik chart with repo values
        run: |
          helm lint /tmp/charts/traefik \
            --values manifests/traefik/values.yaml

      - name: Render Traefik templates
        run: |
          helm template traefik /tmp/charts/traefik \
            --namespace traefik \
            --values manifests/traefik/values.yaml \
            > /tmp/traefik-rendered.yaml
          test -s /tmp/traefik-rendered.yaml

      - name: Render Longhorn templates
        run: |
          helm template longhorn /tmp/charts/longhorn \
            --namespace longhorn-system \
            --set defaultSettings.defaultReplicaCount=1 \
            --set nodeSelector."kubernetes\\.io/hostname"=pi4controller \
            > /tmp/longhorn-rendered.yaml
          test -s /tmp/longhorn-rendered.yaml

      - name: Validate rendered manifests with kubeconform
        run: |
          /tmp/kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            /tmp/traefik-rendered.yaml \
            /tmp/longhorn-rendered.yaml
