name: Cluster Validation

on:
  pull_request:
    branches: [main]
    paths:
      - "cluster/**"
      - "bootstrap/scripts/install-argocd.sh"
      - ".github/workflows/helm-validate.yml"
      - ".github/workflows/reusable-manifest-validation.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  helm_validate:
    name: Helm and Schema Validation
    uses: ./.github/workflows/reusable-manifest-validation.yml
    with:
      validator: kubeconform

  pluto_validate:
    name: API Deprecation Validation
    uses: ./.github/workflows/reusable-manifest-validation.yml
    with:
      validator: pluto
      k8s_target_version: "v1.31.0"
