# Reusable CI workflow for manifest validation.
# Called by helm-validate.yml to run:
# - kubeconform schema checks
# - Pluto API deprecation checks
name: Reusable Manifest Validation

on:
  workflow_call:
    inputs:
      validator:
        description: Validation engine to run (kubeconform or pluto)
        required: true
        type: string
      k8s_target_version:
        description: Target Kubernetes version used by Pluto
        required: false
        default: "v1.31.0"
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Render all Helm releases with helmfile
        id: helmfile_template
        uses: helmfile/helmfile-action@v2
        with:
          helmfile-version: v1.4.2
          helmfile-args: template

      - name: Save rendered Helm manifests
        run: |
          printf '%s\n' "${{ steps.helmfile_template.outputs.helmfile-stdout }}" > /tmp/all-rendered.yaml
          test -s /tmp/all-rendered.yaml

      - name: Setup kubeconform and kustomize
        if: ${{ inputs.validator == 'kubeconform' }}
        uses: yokawasa/action-setup-kube-tools@v0.13.3
        with:
          setup-tools: |
            kubeconform
            kustomize
          kubeconform: "0.6.7"
          kustomize: "5.7.1"

      - name: Validate manifests with kubeconform
        if: ${{ inputs.validator == 'kubeconform' }}
        run: |
          find cluster -type f \( -name "*.yaml" -o -name "*.yml" \) \
            ! -name "values.yaml" \
            -print > /tmp/raw-manifest-files.txt
          test -s /tmp/raw-manifest-files.txt

          xargs -a /tmp/raw-manifest-files.txt kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas

          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            /tmp/all-rendered.yaml

      - name: Download Pluto
        if: ${{ inputs.validator == 'pluto' }}
        uses: FairwindsOps/pluto/github-action@master

      - name: Check manifests with Pluto
        if: ${{ inputs.validator == 'pluto' }}
        run: |
          pluto detect-files \
            --output wide \
            --target-versions "k8s=${{ inputs.k8s_target_version }}" \
            -d cluster

          pluto detect-files \
            --output wide \
            --target-versions "k8s=${{ inputs.k8s_target_version }}" \
            /tmp/all-rendered.yaml
