name: Reusable Manifest Validation

on:
  workflow_call:
    inputs:
      validator:
        description: Validation engine to run (kubeconform or pluto)
        required: true
        type: string
      pluto_version:
        description: Pluto version for API deprecation checks
        required: false
        default: "5.23.5"
        type: string
      k8s_target_version:
        description: Target Kubernetes version used by Pluto
        required: false
        default: "v1.31.0"
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: TuckerWarlock/setup-helm@v5

      - name: Add Helm repositories
        run: |
          helm repo add traefik https://traefik.github.io/charts
          helm repo add longhorn https://charts.longhorn.io
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

      - name: Pull charts locally
        run: |
          mkdir -p /tmp/charts
          helm pull traefik/traefik --untar --untardir /tmp/charts
          helm pull longhorn/longhorn --untar --untardir /tmp/charts
          helm pull argo/argo-cd --untar --untardir /tmp/charts

      - name: Render Helm templates
        run: |
          helm template traefik /tmp/charts/traefik \
            --namespace traefik \
            --values cluster/core-system/traefik/values.yaml \
            > /tmp/traefik-rendered.yaml
          test -s /tmp/traefik-rendered.yaml

          helm template longhorn /tmp/charts/longhorn \
            --namespace longhorn-system \
            --set defaultSettings.defaultReplicaCount=1 \
            --set nodeSelector."kubernetes\\.io/hostname"=pi4controller \
            > /tmp/longhorn-rendered.yaml
          test -s /tmp/longhorn-rendered.yaml

          helm template argocd /tmp/charts/argo-cd \
            --namespace argocd \
            --set server.service.type=ClusterIP \
            --set persistence.enabled=true \
            --set persistence.storageClassName=longhorn \
            --set persistence.size=2Gi \
            --set dex.enabled=false \
            > /tmp/argocd-rendered.yaml
          test -s /tmp/argocd-rendered.yaml

      - name: Install kubeconform
        if: ${{ inputs.validator == 'kubeconform' }}
        run: |
          KUBECONFORM_VERSION=v0.6.7
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          /tmp/kubeconform -v

      - name: Validate manifests with kubeconform
        if: ${{ inputs.validator == 'kubeconform' }}
        run: |
          find cluster -type f \( -name "*.yaml" -o -name "*.yml" \) \
            ! -name "values.yaml" \
            -print > /tmp/raw-manifest-files.txt
          test -s /tmp/raw-manifest-files.txt

          xargs -a /tmp/raw-manifest-files.txt /tmp/kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas

          /tmp/kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            /tmp/traefik-rendered.yaml \
            /tmp/longhorn-rendered.yaml \
            /tmp/argocd-rendered.yaml

      - name: Install Pluto
        if: ${{ inputs.validator == 'pluto' }}
        run: |
          curl -fsSL -o /tmp/pluto.tar.gz \
            "https://github.com/FairwindsOps/pluto/releases/download/v${{ inputs.pluto_version }}/pluto_${{ inputs.pluto_version }}_linux_amd64.tar.gz"
          tar -xzf /tmp/pluto.tar.gz -C /tmp pluto
          /tmp/pluto version

      - name: Check manifests with Pluto
        if: ${{ inputs.validator == 'pluto' }}
        run: |
          /tmp/pluto detect-files \
            --output wide \
            --target-versions "k8s=${{ inputs.k8s_target_version }}" \
            -d cluster

          /tmp/pluto detect-files \
            --output wide \
            --target-versions "k8s=${{ inputs.k8s_target_version }}" \
            /tmp/traefik-rendered.yaml \
            /tmp/longhorn-rendered.yaml \
            /tmp/argocd-rendered.yaml
