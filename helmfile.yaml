repositories:
  - name: argo
    url: https://argoproj.github.io/argo-helm

releases:
  # ArgoCD is the only component bootstrapped via helmfile.
  # Everything else (MetalLB, Traefik, Longhorn, monitoring) is managed by ArgoCD
  # after the root Application is applied (kubectl apply -f cluster/argocd/root-application.yaml).
  - name: argocd
    namespace: argocd
    chart: argo/argo-cd
    version: 7.8.1
    createNamespace: true
    values:
      - cluster/argocd/argocd-values.yaml

