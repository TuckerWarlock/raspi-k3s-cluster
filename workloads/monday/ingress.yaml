apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monday
  namespace: monday
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
  - host: monday.cluster.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: open-webui
            port:
              number: 8080
