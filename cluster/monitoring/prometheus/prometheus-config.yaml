apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 60s
      evaluation_interval: 60s

    rule_files:
      - /etc/prometheus/alerts.yml
    
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

  alerts.yml: |
    groups:
      - name: node-memory
        rules:
          # Warn at 75% memory usage — gives time to act before kubelet eviction kicks in at ~85%
          - alert: NodeMemoryPressureWarning
            expr: |
              (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.75
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Node {{ $labels.instance }} memory usage above 75%"
              description: "Memory usage is {{ $value | humanizePercentage }}. Kubelet soft eviction triggers at ~87% (512Mi available on 4GB)."

          # Critical — kubelet hard eviction is imminent (<300Mi available on controller)
          - alert: NodeMemoryPressureCritical
            expr: |
              node_memory_MemAvailable_bytes < 400 * 1024 * 1024
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.instance }} near OOM — {{ $value | humanize1024 }}B available"
              description: "Less than 400Mi available. Kubelet hard eviction threshold is 300Mi. Pods will be force-evicted shortly."

      - name: pod-memory
        rules:
          # Alert when a container is using >90% of its memory limit
          - alert: ContainerNearMemoryLimit
            expr: |
              (container_memory_working_set_bytes{container!=""} /
               on(namespace, pod, container) kube_pod_container_resource_limits{resource="memory"}) > 0.90
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} near memory limit"
              description: "Container is using {{ $value | humanizePercentage }} of its memory limit. OOMKill imminent."
