# Prometheus configuration for K3s cluster monitoring
# Pi 4 controller with 15-day retention via Longhorn PVC

prometheus:
  prometheusSpec:
    # Pin to controller (light on resources but needs persistence)
    nodeSelector:
      kubernetes.io/hostname: pi4controller
    
    # Storage: 15-day retention on Longhorn
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    
    # Retention: 15 days
    retention: 15d
    retentionSize: ""
    
    # Light resource limits for Pi 4
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    
    # Service monitor to scrape metrics
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    
    # Pod monitor for custom scraping
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

# Prometheus Operator
prometheusOperator:
  nodeSelector:
    kubernetes.io/hostname: pi4controller

# Kube-state-metrics (small footprint on controller only)
kubeStateMetrics:
  nodeSelector:
    kubernetes.io/hostname: pi4controller
  enabled: true

# Prometheus Node Exporter: DaemonSet on all nodes (collect node metrics)
prometheus-node-exporter:
  nodeSelector: {}  # Run on all nodes
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Grafana configuration
grafana:
  enabled: true
  adminPassword: admin  # Change in production!
  
  # Pin to controller
  nodeSelector:
    kubernetes.io/hostname: pi4controller
  
  # Persistence: use Longhorn
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 2Gi
  
  # Light resources
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  
  # Pre-install datasource for Prometheus
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-operated:9090
          access: proxy
          isDefault: true

# Alertmanager
alertmanager:
  enabled: false  # Skip for now, can enable later

# Service monitors for built-in K3s components
prometheus-pushgateway:
  enabled: false
