service:
  type: LoadBalancer

# Pin Traefik to the controller — Pi Zeros don't have enough RAM
nodeSelector:
  kubernetes.io/hostname: pi4controller

# Resource limits — unbounded Traefik can grow to 100Mi+ under load
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

logs:
  access:
    enabled: true

# Expose the dashboard via IngressRoute on /dashboard
ingressRoute:
  dashboard:
    enabled: true
    entryPoints:
      - web

ports:
  web:
    port: 8000
    exposedPort: 80
  websecure:
    port: 8443
    exposedPort: 443
