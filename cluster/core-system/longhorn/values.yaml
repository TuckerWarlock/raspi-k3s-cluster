# Pin Longhorn to the controller — Pi Zeros don't have enough RAM for storage replicas
nodeSelector:
  kubernetes.io/hostname: pi4controller

defaultSettings:
  # Single replica is appropriate for this small cluster
  defaultReplicaCount: 1
  # Reserve 12% of controller CPU for each instance-manager pod (Longhorn default)
  guaranteedInstanceManagerCPU: 12

# Reduce CSI sidecars from 2 to 1 — single replica is sufficient for a single-node storage backend
csi:
  attacherReplicaCount: 1
  provisionerReplicaCount: 1
  resizerReplicaCount: 1
  snapshotterReplicaCount: 1

# Single UI replica is sufficient; default is 2
longhornUI:
  replicas: 1

# Note: longhornManager DaemonSet resource limits are not configurable via Helm values (chart gap).
# Applied via kubectl strategic merge patch (run once, not tracked in Git):
#   kubectl patch daemonset longhorn-manager -n longhorn-system --type=strategic \
#     -p '{"spec":{"template":{"spec":{"containers":[{"name":"longhorn-manager",
#          "resources":{"requests":{"cpu":"50m","memory":"128Mi"},
#                       "limits":{"cpu":"250m","memory":"256Mi"}}}]}}}}'
# ignoreDifferences in the Longhorn ArgoCD Application prevents ArgoCD from reverting this.
