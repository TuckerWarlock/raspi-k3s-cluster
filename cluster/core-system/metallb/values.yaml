# MetalLB speaker on pi4controller only (has eth0 for L2 advertisement)
# Pi Zero workers (p1-p4) don't have LAN interfaces, so speakers there waste memory

speaker:
  nodeSelector:
    kubernetes.io/hostname: pi4controller
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

controller:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
