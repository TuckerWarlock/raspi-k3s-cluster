# App of Apps: applied once after `helmfile sync` bootstraps ArgoCD.
# ArgoCD then manages everything in cluster/argocd/addons/ automatically.
#
# Apply with:
#   kubectl apply -f cluster/argocd/root-application.yaml
#
# What this deploys (via addons/kustomization.yaml):
#   - Core infra: MetalLB, Traefik, Longhorn
#   - ArgoCD config (ingress, etc.)
#   - Workloads root app → manages cluster/argocd/workloads/ (Monday, etc.)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TuckerWarlock/raspi-k3s-cluster
    path: cluster/argocd/addons
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
