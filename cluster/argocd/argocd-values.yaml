# ArgoCD Helm Values
# Applied by helmfile during the bootstrap phase (helmfile sync).
# After ArgoCD is running it manages its own Applications from Git.
#
# To find available chart values:
#   helm show values argo/argo-cd --version 7.8.1

server:
  service:
    type: ClusterIP
  # Resource limits prevent ArgoCD server from starving other pods under memory pressure.
  # These are sized for a small cluster (< 10 ArgoCD Applications).
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

# Run argocd-server in HTTP mode so Traefik can proxy it without a redirect loop.
# Traefik handles TLS termination at the ingress layer.
configs:
  params:
    server.insecure: true

# Dex (OIDC/SSO) is unused in this cluster
dex:
  enabled: false

# Single-instance Redis is fine for this cluster size; state lives in CRDs
redis:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 128Mi

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

applicationSet:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 128Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi
