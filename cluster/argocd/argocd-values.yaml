# ArgoCD Helm Values
# Applied by helmfile during the bootstrap phase (helmfile sync).
# After ArgoCD is running it manages its own Applications from Git.
#
# To find available chart values:
#   helm show values argo/argo-cd --version 7.8.1

server:
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

configs:
  params:
    server.insecure: true

dex:
  enabled: false

redis:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 128Mi

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      # Bumped from 256Mi — repo-server fetches and caches Helm charts for multi-source
      # Applications. Under-sizing caused liveness probe timeouts on simultaneous syncs.
      memory: 384Mi
  # Default liveness probe has timeoutSeconds: 1 which is too tight on a Pi 4 ARM64
  # processor when the repo-server is busy fetching multiple Helm charts concurrently.
  # Increasing timeout and failure threshold prevents spurious restarts under load.
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5

# Notifications controller is unused in this cluster (no alerting configured)
notifications:
  enabled: false

# ApplicationSet controller is unused — we use plain Application CRDs, not ApplicationSets.
# Note: applicationSet.enabled is not a valid chart key (silently ignored).
# Setting replicas: 0 is the correct way to disable this controller in chart 7.8.1.
applicationSet:
  replicas: 0

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi
