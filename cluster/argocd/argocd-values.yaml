# ArgoCD Helm Values
# Applied by helmfile during the bootstrap phase (helmfile sync).
# After ArgoCD is running it manages its own Applications from Git.
#
# To find available chart values:
#   helm show values argo/argo-cd --version 7.8.1

server:
  service:
    type: ClusterIP

# Run argocd-server in HTTP mode so Traefik can proxy it without a redirect loop.
# Traefik handles TLS termination at the ingress layer.
configs:
  params:
    server.insecure: true

# Dex (OIDC/SSO) is unused in this cluster
dex:
  enabled: false

# Single-instance Redis is fine for this cluster size; state lives in CRDs
redis:
  enabled: true
