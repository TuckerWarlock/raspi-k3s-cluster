# ArgoCD Helm Values
# Applied by helmfile during the bootstrap phase (helmfile sync).
# After ArgoCD is running it manages its own Applications from Git.
#
# To find available chart values:
#   helm show values argo/argo-cd --version 7.8.1

server:
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

configs:
  params:
    server.insecure: true

dex:
  enabled: false

redis:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 128Mi

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

# Notifications controller is unused in this cluster (no alerting configured)
notifications:
  enabled: false

# ApplicationSet controller is unused — we use plain Application CRDs, not ApplicationSets
applicationSet:
  enabled: false

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi
