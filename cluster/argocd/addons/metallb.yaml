apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
spec:
  project: default
  sources:
    # Upstream Helm chart
    - repoURL: https://metallb.github.io/metallb
      chart: metallb
      targetRevision: 0.14.9
      helm:
        valueFiles:
          - $values/cluster/core-system/metallb/values.yaml
    # Git ref that provides $values for the valueFiles path above
    - repoURL: https://github.com/TuckerWarlock/raspi-k3s-cluster
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply prevents CRD drift — MetalLB CRDs (e.g. bgppeers.metallb.io)
      # have server-managed fields that client-side apply can't reconcile cleanly.
      - ServerSideApply=true
