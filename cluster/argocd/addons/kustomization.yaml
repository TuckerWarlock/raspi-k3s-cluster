apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Core infrastructure — managed by ArgoCD via Helm (multi-source Applications)
  - metallb.yaml
  - metallb-config.yaml
  - traefik.yaml
  - longhorn.yaml
  # ArgoCD own config (ingress, etc.) — managed by ArgoCD
  - argocd-config.yaml
  # Monitoring stack
  - prometheus.yaml
  - loki.yaml
  - promtail.yaml
