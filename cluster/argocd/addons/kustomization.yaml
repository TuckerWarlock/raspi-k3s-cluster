apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Core infrastructure — managed by ArgoCD via Helm (multi-source Applications)
  # These replace the helmfile-managed releases for metallb, traefik, and longhorn.
  - metallb.yaml
  - metallb-config.yaml
  - traefik.yaml
  - longhorn.yaml
  # Monitoring (grafana.yaml temporarily removed — too memory-heavy)
  - prometheus.yaml
  - loki.yaml
  - promtail.yaml
