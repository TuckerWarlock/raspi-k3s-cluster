apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 27.0.0
    helm:
      valuesObject:
        deployment:
          nodeSelector:
            kubernetes.io/hostname: pi4controller
  
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
