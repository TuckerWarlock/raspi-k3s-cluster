apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  sources:
    # Upstream Helm chart
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: 1.7.2
      helm:
        valueFiles:
          - $values/cluster/core-system/longhorn/values.yaml
    # Git ref that provides $values for the valueFiles path above
    - repoURL: https://github.com/TuckerWarlock/raspi-k3s-cluster
      targetRevision: main
      ref: values
    # Kustomize patches for settings not exposed in Helm chart values
    # (e.g. longhorn-manager DaemonSet resource limits)
    - repoURL: https://github.com/TuckerWarlock/raspi-k3s-cluster
      targetRevision: main
      path: cluster/core-system/longhorn/patches
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # ignoreDifferences for fields that are patched outside the Helm chart:
  # - longhorn-manager container resources (chart gap — not configurable via values.yaml)
  ignoreDifferences:
    - group: apps
      kind: DaemonSet
      name: longhorn-manager
      namespace: longhorn-system
      jqPathExpressions:
        - .spec.template.spec.containers[] | select(.name == "longhorn-manager") | .resources
