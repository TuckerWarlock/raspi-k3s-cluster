apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: local-pool
  namespace: metallb-system
spec:
  addresses:
    # Set this to an unused range in your LAN subnet, outside your router's DHCP range.
    # Example: if your LAN is 192.168.1.0/24 and DHCP gives .100–.200, use .201–.220
    - 192.168.1.201-192.168.1.220
