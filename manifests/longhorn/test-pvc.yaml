apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-longhorn-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: test-longhorn-pod
  namespace: default
spec:
  containers:
  - name: busybox
    image: busybox:latest
    command: ['sh', '-c', 'echo "Longhorn test" > /mnt/test.txt && sleep 3600']
    volumeMounts:
    - name: storage
      mountPath: /mnt
  volumes:
  - name: storage
    persistentVolumeClaim:
      claimName: test-longhorn-pvc
  restartPolicy: Always
